<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Мединтернет</title>
    <!-- MAX Bridge SDK: даёт глобальный объект window.WebApp -->
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
          media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"></noscript>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loading" class="loading"><div class="spinner"></div></div>

    <!-- Регистрация (для незарегистрированных) -->
    <section id="screen-register" class="screen" hidden>
        <div class="scroll">
            <div class="card">
                <img class="logo-img" src="/logo.png" alt="Мединтернет">
                <p class="subtitle">
                    Чтобы пользоваться медицинским поисковиком, зарегистрируйтесь.
                    На сайте <b>medinternet.ru</b> в личном кабинете есть ссылка для
                    регистрации в <b>MAX</b>. Нажмите кнопку ниже, чтобы перейти к регистрации.
                </p>
                <button id="register-btn" class="btn btn-primary register-cta" type="button">Зарегистрироваться</button>
            </div>
        </div>
    </section>

    <!-- Основное приложение (для зарегистрированных) -->
    <section id="app" class="screen" hidden>
        <!-- Медицинский поисковик -->
        <section id="screen-search" class="subscreen">
            <header class="topbar">
                <div class="topbar-heading">
                    <div class="topbar-title">Медицинский поисковик</div>
                </div>
                <div class="topbar-actions">
                    <button id="chat-reset" class="btn-newchat" type="button">Новый чат</button>
                    <button id="history-btn" class="icon-round" type="button" title="История запросов" aria-label="История запросов">🕘</button>
                    <button class="icon-round theme-toggle" type="button" title="Сменить тему" aria-label="Сменить тему">🌙</button>
                </div>
            </header>
            <div id="messages" class="messages">
                <div class="prompt-chips"></div>
            </div>
            <form id="chat-form" class="chat-form">
                <textarea id="chat-input" rows="1" autocomplete="off" placeholder="Задайте вопрос…"></textarea>
                <button type="submit" id="chat-send" class="send-btn" aria-label="Отправить">➤</button>
            </form>
        </section>

        <!-- История: список чатов -->
        <section id="screen-history" class="subscreen" hidden>
            <header class="topbar">
                <button id="history-back" class="icon-round" type="button" aria-label="Назад">←</button>
                <div class="sub-title">История запросов</div>
            </header>
            <div id="history-chats" class="scroll history-chats"></div>
        </section>

        <!-- Просмотр выбранного чата -->
        <section id="screen-chat" class="subscreen" hidden>
            <header class="topbar">
                <button id="chatview-back" class="icon-round" type="button" aria-label="Назад">←</button>
                <div class="sub-title" id="chatview-title">Чат</div>
            </header>
            <div id="chatview-messages" class="messages"></div>
        </section>
    </section>

    <script src="/app.js"></script>
</body>
</html>
